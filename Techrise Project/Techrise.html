<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TechRise Login</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #0B0F1A;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

.container {
  width: 90%;
  max-width: 360px;
  text-align: center;
}

/* Logo */
.logo {
  font-size: 32px;
  font-weight: 700;
  display: inline-block;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #ffffff;
  /* subtle static glow to blend with animated glow */
  text-shadow: 0 4px 14px rgba(99, 61, 244, 0.15);
  transform-origin: center bottom;
  animation: bounce 2000ms cubic-bezier(.2,.9,.2,1) infinite,
             glow 3000ms ease-in-out infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  40% { transform: translateY(-8px); }
  60% { transform: translateY(-4px); }
}

@keyframes glow {
  0%, 100% {
    text-shadow: 0 6px 18px rgba(99,61,244,0.18), 0 0 28px rgba(147,51,234,0.06);
  }
  50% {
    text-shadow: 0 10px 34px rgba(99,61,244,0.30), 0 0 48px rgba(147,51,234,0.20);
  }
}

.tagline {
  font-size: 12px;
  opacity: 0.75;
  letter-spacing: 2px;
  margin-bottom: 30px;
}

/* Welcome */
h2 {
  font-weight: 500;
  margin-bottom: 6px;
}

.subtitle {
  color: #9CA3AF;
  font-size: 14px;
  margin-bottom: 25px;
}

/* Inputs */
.input-group {
  background: #121826;
  border-radius: 14px;
  padding: 14px;
  display: flex;
  align-items: center;
  margin-bottom: 15px;
}

.input-group input {
  background: transparent;
  border: none;
  outline: none;
  color: white;
  width: 100%;
  margin-left: 10px;
}

.input-group input::placeholder {
  color: #9CA3AF;
}

/* Button */
.login-btn {
  width: 100%;
  padding: 14px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(135deg, #6c3df4, #9333ea);
  background-size: 200% 200%;
  color: white;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
  box-shadow: 0 6px 18px rgba(147, 51, 234, 0.18);
  transition: transform 220ms cubic-bezier(.2,.9,.2,1),
              box-shadow 220ms cubic-bezier(.2,.9,.2,1),
              background-position 420ms ease;
  will-change: transform, box-shadow;
  outline: none;
}
.login-btn:hover {
  transform: translateY(-4px) scale(1.02);
  box-shadow: 0 18px 38px rgba(99, 61, 244, 0.18);
  background-position: right center;
}
.login-btn:active {
  transform: translateY(-1px) scale(0.995);
  box-shadow: 0 8px 22px rgba(99, 61, 244, 0.14);
}
.login-btn:focus {
  box-shadow: 0 10px 30px rgba(147, 51, 234, 0.22), 0 0 0 4px rgba(147,51,234,0.08);
}
/* Forgot password */
.forgot {
  text-align: right;
  font-size: 12px;
  color: #9CA3AF;
  margin-top: 10px;
  cursor: pointer;
}

/* Divider */
.divider {
  margin: 25px 0;
  display: flex;
  align-items: center;
  color: #9CA3AF;
  font-size: 12px;
}

.divider::before,
.divider::after {
  content: "";
  flex: 1;
  height: 1px;
  background: #2a2f3a;
}

.divider span {
  margin: 0 10px;
}

/* Google Button */
.google-btn {
  background: white;
  color: black;
  padding: 12px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  cursor: pointer;
  font-weight: 500;
}

/* Signup */
.signup {
  margin-top: 20px;
  font-size: 14px;
  color: #9CA3AF;
}

.signup span {
  color: #9333ea;
  font-weight: 500;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

  <!-- Logo -->
  <div class="logo" aria-label="TechRise logo">TECHRISE</div>
  <div class="tagline">Learn • Build • Rise</div>

  <!-- Welcome -->
  <h2>Welcome Back 👋</h2>
  <div class="subtitle">Login to continue your journey</div>

  <!-- Inputs -->
  <div class="input-group">
    📧
    <input type="email" placeholder="Email">
  </div>

  <div class="input-group">
    🔒
    <input type="password" id="password" placeholder="Password">
    <span onclick="togglePassword()" style="cursor:pointer;">👁</span>
  </div>

  <!-- Button -->
  <button class="login-btn">LOGIN</button>

  <!-- Forgot -->
  <div class="forgot">Forgot password?</div>

  <!-- Divider -->
  <div class="divider"><span>OR</span></div>

  <!-- Google -->
  <div class="google-btn">
    <img src="https://img.icons8.com/color/16/google-logo.png"/>
    Continue with Google
  </div>

  <!-- Signup -->
  <div class="signup">
    Don’t have an account? <span>Create Account</span>
  </div>

</div>

<script>
function togglePassword() {
  const password = document.getElementById("password");
  password.type = password.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
